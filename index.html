<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CV</title>
  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: #f5f5f5;
      font-family: Arial, sans-serif;
      color: #222;
    }

    .page {
      max-width: 980px;
      margin: 0 auto;
      padding: 16px 12px 40px;
    }

    .actions {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 14px;
      position: sticky;
      top: 0;
      z-index: 10;
      background: #f5f5f5;
      padding: 8px 0 12px;
    }

    .btn {
      display: inline-block;
      padding: 12px 18px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
      border: 1px solid #222;
      color: #fff;
      background: #222;
      text-align: center;
      min-width: 130px;
    }

    .btn.secondary {
      background: #fff;
      color: #222;
    }

    .note {
      text-align: center;
      color: #666;
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 14px;
    }

    .viewer {
      display: flex;
      flex-direction: column;
      gap: 18px;
      align-items: center;
    }

    .pdf-page {
      width: 100%;
      display: flex;
      justify-content: center;
    }

    .pdf-page canvas {
      width: 100%;
      height: auto;
      display: block;
      background: white;
      border: 1px solid #ddd;
      border-radius: 10px;
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.06);
    }

    .loading,
    .error {
      text-align: center;
      color: #666;
      padding: 30px 10px;
      font-size: 15px;
    }

    @media (max-width: 768px) {
      .page {
        padding: 12px 8px 30px;
      }

      .actions {
        flex-direction: column;
        align-items: center;
      }

      .btn {
        width: 100%;
        max-width: 280px;
      }

      .note {
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="actions">
      <a class="btn" href="CV_Judy_Kim_20260323.pdf" target="_blank" rel="noopener noreferrer">Open PDF</a>
      <a class="btn secondary" href="CV_Judy_Kim_20260323.pdf" download>Download</a>
    </div>
    
    <div id="status" class="loading">PDF 불러오는 중...</div>
    <div id="viewer" class="viewer"></div>
    
    <div class="note">
      브라우저 환경에 따라 표시가 불안정한 경우에는 <strong>Open PDF</strong> 버튼을 눌러 확인해 주세요.
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@4.4.168/build/pdf.min.mjs" type="module"></script>
  <script type="module">
    import * as pdfjsLib from "https://cdn.jsdelivr.net/npm/pdfjs-dist@4.4.168/build/pdf.min.mjs";
  
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdn.jsdelivr.net/npm/pdfjs-dist@4.4.168/build/pdf.worker.min.mjs";
  
    const viewer = document.getElementById("viewer");
    const status = document.getElementById("status");
  
    const openBtn = document.querySelector(".btn");
    const downloadBtn = document.querySelector(".btn.secondary");
  
    async function loadConfig() {
      const response = await fetch("config.json", { cache: "no-store" });
      if (!response.ok) {
        throw new Error("config.json을 불러오지 못했습니다.");
      }
      return await response.json();
    }
  
    async function renderPDF(pdfFile) {
      openBtn.href = pdfFile;
      downloadBtn.href = pdfFile;
      downloadBtn.setAttribute("download", pdfFile);
  
      const loadingTask = pdfjsLib.getDocument(pdfFile);
      const pdf = await loadingTask.promise;
  
      status.textContent = `총 ${pdf.numPages}페이지 불러오는 중...`;
  
      for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
        const page = await pdf.getPage(pageNum);
  
        const unscaledViewport = page.getViewport({ scale: 1 });
        const containerWidth = Math.min(viewer.clientWidth || 900, 900);
        const scale = containerWidth / unscaledViewport.width;
        const viewport = page.getViewport({ scale });
  
        const pageWrap = document.createElement("div");
        pageWrap.className = "pdf-page";
  
        const canvas = document.createElement("canvas");
        const context = canvas.getContext("2d");
  
        canvas.width = Math.floor(viewport.width);
        canvas.height = Math.floor(viewport.height);
  
        pageWrap.appendChild(canvas);
        viewer.appendChild(pageWrap);
  
        await page.render({
          canvasContext: context,
          viewport
        }).promise;
      }
  
      status.style.display = "none";
    }
  
    async function init() {
      try {
        const config = await loadConfig();
        const pdfFile = config.currentPdf;
  
        if (!pdfFile) {
          throw new Error("config.json에 currentPdf 값이 없습니다.");
        }
  
        await renderPDF(pdfFile);
      } catch (err) {
        console.error(err);
        status.className = "error";
        status.innerHTML = `
          PDF를 표시하는 중 문제가 발생했습니다.<br>
          아래 버튼을 눌러 직접 열어 주세요.
        `;
      }
    }
  
    init();
  </script>
</body>
</html>
