<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DoHyang (Judy) Kim | CV</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      color: #222;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .header {
      text-align: center;
      margin-bottom: 24px;
    }

    .header h1 {
      margin: 0;
      font-size: 2rem;
    }

    .header p {
      margin-top: 8px;
      color: #666;
      font-size: 1rem;
    }

    .actions {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin: 24px 0 32px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-block;
      padding: 12px 18px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      border: 1px solid #222;
      color: #fff;
      background: #222;
    }

    .btn.secondary {
      background: #fff;
      color: #222;
    }

    .pdf-frame {
      width: 100%;
      height: 85vh;
      border: 1px solid #ddd;
      border-radius: 12px;
      background: white;
      box-shadow: 0 4px 20px rgba(0,0,0,0.06);
    }

    .fallback {
      margin-top: 20px;
      text-align: center;
      color: #666;
      font-size: 0.95rem;
    }

    @media (max-width: 768px) {
      .pdf-frame {
        height: 70vh;
      }
      .header h1 {
        font-size: 1.6rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>DoHyang (Judy) Kim</h1>
      <p>Curriculum Vitae</p>
    </div>

    <div class="actions">
      <a class="btn" href="CV_JUDY_260323.pdf" target="_blank">Open PDF</a>
      <a class="btn secondary" href="CV_Judy_Kim_20260323.pdf" download>Download CV</a>
    </div>

    <iframe
      class="pdf-frame"
      src="CV_JUDY_260323.pdf"
      title="Judy Kim CV">
    </iframe>

    <div class="fallback">
      If the PDF preview does not display on your browser or mobile device,
      please use the “Open PDF” or “Download CV” button above.
    </div>
  </div>
</body>
</html>
