<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CV</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      background: #f5f5f5;
      font-family: Arial, sans-serif;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 12px;
      gap: 12px;
    }

    .actions {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-block;
      padding: 12px 18px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      border: 1px solid #222;
      color: #fff;
      background: #222;
      text-align: center;
    }

    .btn.secondary {
      background: #fff;
      color: #222;
    }

    .viewer-wrap {
      flex: 1;
      min-height: 0;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 10px;
      overflow: hidden;
    }

    .viewer {
      width: 100%;
      height: calc(100vh - 90px);
      border: 0;
      display: block;
      background: #fff;
    }

    .note {
      text-align: center;
      color: #666;
      font-size: 14px;
      padding: 4px 8px 0;
      line-height: 1.5;
    }

    @media (max-width: 768px) {
      .page {
        padding: 10px;
      }

      .actions {
        flex-direction: column;
        align-items: center;
      }

      .btn {
        width: 100%;
        max-width: 280px;
      }

      .viewer {
        height: 75vh;
      }

      .note {
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="actions">
      <a class="btn" href="CV_Judy_Kim_20260323.pdf" target="_blank" rel="noopener noreferrer">Open PDF</a>
      <a class="btn secondary" href="CV_Judy_Kim_20260323.pdf" download>Download</a>
    </div>

    <div class="viewer-wrap">
      <iframe
        class="viewer"
        src="CV_Judy_Kim_20260323.pdf#view=FitH"
        title="CV PDF Viewer">
      </iframe>
    </div>

    <div class="note">
      모바일 환경에서는 브라우저 설정에 따라 PDF 미리보기가 정상 표시되지 않을 수 있습니다.<br>
      화면이 비어 있거나 작게 보일 경우 <strong>Open PDF</strong> 버튼을 눌러 전체 화면으로 확인해 주세요.
    </div>
  </div>
</body>
</html>
